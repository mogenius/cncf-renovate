apiVersion: v1
kind: Secret
metadata:
  name: renovate-secrets
  namespace: renovate-system
type: Opaque
stringData:
  # GitHub/GitLab token
  RENOVATE_TOKEN: "ghp_your_token_here"

  # Optional: GitHub App credentials (preferred for orgs)
  GITHUB_APP_ID: "12345"
  GITHUB_APP_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    ...
    -----END RSA PRIVATE KEY-----
